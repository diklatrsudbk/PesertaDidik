<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Sistem Data Peserta Didik 2026
  </title>

  <!-- TAILWIND -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ALPINE -->
  <script
    defer
    src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"
  ></script>

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="assets/css/style.css"
  >

</head>

<body
  class="bg-gray-100 min-h-screen p-4"
  x-data="app()"
>

<div class="max-w-4xl mx-auto">

  <!-- HEADER -->

  <div class="bg-white rounded-2xl shadow p-6 mb-6">

    <div class="flex items-center gap-4">

      <img
        src="assets/img/rsudbk.png"
        class="h-20"
        alt="Logo"
      >

      <div>

        <h1 class="text-2xl font-bold">
          Sistem Data Peserta Didik 2026
        </h1>

        <p class="text-gray-500 text-sm">
          Form Pendaftaran Peserta
        </p>

      </div>

    </div>

  </div>

  <!-- FORM -->

  <form
    @submit.prevent="submitForm"
    class="space-y-6"
  >

    <!-- DATA PRIBADI -->

    <div class="bg-white rounded-2xl shadow p-6">

      <h2 class="font-bold text-lg mb-5">
        Data Pribadi
      </h2>

      <div class="grid md:grid-cols-2 gap-4">

        <div>
          <label class="text-sm font-bold">
            Nama Lengkap
          </label>

          <input
            type="text"
            x-model="form.nama"
            class="w-full border rounded-lg p-3"
            required
          >
        </div>

        <div>
          <label class="text-sm font-bold">
            NIM
          </label>

          <input
            type="text"
            x-model="form.nim"
            class="w-full border rounded-lg p-3"
            required
          >
        </div>

        <div>
          <label class="text-sm font-bold">
            No KTP
          </label>

          <input
            type="number"
            x-model="form.ktp"
            class="w-full border rounded-lg p-3"
          >
        </div>

        <div>
          <label class="text-sm font-bold">
            No WhatsApp
          </label>

          <input
            type="number"
            x-model="form.hp"
            class="w-full border rounded-lg p-3"
          >
        </div>

        <div>
          <label class="text-sm font-bold">
            Tempat Lahir
          </label>

          <input
            type="text"
            x-model="form.tempatlahir"
            class="w-full border rounded-lg p-3"
          >
        </div>

        <div>
          <label class="text-sm font-bold">
            Tanggal Lahir
          </label>

          <input
            type="date"
            x-model="form.tanggallahir"
            class="w-full border rounded-lg p-3"
          >
        </div>

        <div>
          <label class="text-sm font-bold">
            Jenis Kelamin
          </label>

          <select
            x-model="form.kelamin"
            class="w-full border rounded-lg p-3"
          >
            <option>Laki-Laki</option>
            <option>Perempuan</option>
          </select>
        </div>

        <div>
          <label class="text-sm font-bold">
            Agama
          </label>

          <select
            x-model="form.agama"
            class="w-full border rounded-lg p-3"
          >
            <option>Islam</option>
            <option>Kristen</option>
            <option>Protestan</option>
            <option>Katolik</option>
            <option>Budha</option>
            <option>Hindu</option>
            <option>Konghucu</option>
          </select>
        </div>

        <div class="md:col-span-2">

          <label class="text-sm font-bold">
            Alamat
          </label>

          <textarea
            x-model="form.alamat"
            class="w-full border rounded-lg p-3"
          ></textarea>

        </div>

      </div>

    </div>

    <!-- DATA PENDIDIKAN -->

    <div class="bg-white rounded-2xl shadow p-6">

      <h2 class="font-bold text-lg mb-5">
        Data Pendidikan
      </h2>

      <div class="grid md:grid-cols-2 gap-4">

        <div>
          <label class="text-sm font-bold">
            Nama Institusi
          </label>

          <input
            type="text"
            x-model="form.namasekolah"
            class="w-full border rounded-lg p-3"
          >
        </div>

        <div>
          <label class="text-sm font-bold">
            Jurusan
          </label>

          <input
            type="text"
            x-model="form.jurusan"
            class="w-full border rounded-lg p-3"
          >
        </div>

        <div>
          <label class="text-sm font-bold">
            Jenjang Pendidikan
          </label>

          <select
            x-model="form.jenjangpend"
            class="w-full border rounded-lg p-3"
          >
            <option>SMK</option>
            <option>D3</option>
            <option>S1</option>
            <option>S2</option>
            <option>Profesi</option>
          </select>
        </div>

        <div>
          <label class="text-sm font-bold">
            Jenis
          </label>

          <select
            x-model="form.jenis"
            class="w-full border rounded-lg p-3"
          >
            <option>PKL</option>
            <option>PBL</option>
            <option>Resident</option>
            <option>Magang</option>
          </select>
        </div>

      </div>

    </div>

    <!-- PERIODE -->

    <div class="bg-white rounded-2xl shadow p-6">

      <h2 class="font-bold text-lg mb-5">
        Periode
      </h2>

      <div class="grid md:grid-cols-2 gap-4">

        <div>

          <label class="text-sm font-bold">
            Tanggal Mulai
          </label>

          <input
            type="date"
            x-model="form.tanggal_mulai"
            class="w-full border rounded-lg p-3"
          >

        </div>

        <div>

          <label class="text-sm font-bold">
            Tanggal Selesai
          </label>

          <input
            type="date"
            x-model="form.tanggal_selesai"
            class="w-full border rounded-lg p-3"
          >

        </div>

      </div>

    </div>

    <!-- FOTO -->

    <div class="bg-white rounded-2xl shadow p-6">

      <h2 class="font-bold text-lg mb-5">
        Upload Foto
      </h2>

      <input
        type="file"
        accept=".jpg,.jpeg,.png"
        @change="handlePhoto"
      >

    </div>

    <!-- PDF -->

    <div class="bg-white rounded-2xl shadow p-6">

      <h2 class="font-bold text-lg mb-5">
        Upload PDF
      </h2>

      <input
        type="file"
        multiple
        accept=".pdf"
        @change="handlePdf"
      >

    </div>

    <!-- SUBMIT -->

    <button
      type="submit"
      class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg"
      :disabled="loading"
    >

      <span x-show="!loading">
        SUBMIT DATA
      </span>

      <span x-show="loading">
        MENGIRIM...
      </span>

    </button>

  </form>

</div>

<!-- JS -->
<script src="assets/js/config.js"></script>
<script src="assets/js/helpers.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/app.js"></script>


</body>
</html>
