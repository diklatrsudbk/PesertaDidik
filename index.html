<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
function app() {
    // --- KONFIGURASI SUPABASE ---
    const SUPABASE_URL = 'https://gyiucoognxykakksrulo.supabase.co/rest/v1/'; // Ganti dengan URL kamu
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5aXVjb29nbnh5a2Fra3NydWxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjQ0MDQsImV4cCI6MjA5Mjg0MDQwNH0.Ht_yQbty5AaWYZWPp7sLWwIRDrmNs-LPot0NnVi3VIU'; // Ganti dengan Key kamu
    const supabase = supabasejs.createClient(SUPABASE_URL, SUPABASE_KEY);

    return {
        view: 'menu',
        loading: false,
        isEdit: false,
        progressText: '',
        photoPreview: null,
        options: { /* ... tetap sama seperti kode lama kamu ... */ },
        formData: { 
            tipe: 'Perorangan', bagian: '', jenis: 'Magang', jenjangPendidikan: 'S1', 
            namaInstitusi: '', jurusan: '', kotaInstitusi: '', level: 1, 
            startDate: '', endDate: '', nama: '', nim: '', ktp: '', hp: '', 
            agama: 'Islam', jenisKelamin: 'Laki-Laki', tempatLahir: '', 
            tanggalLahir: '', alamat: '', kelurahanKecamatan: ''
        },
        kelompok: [],

        // Handle Photo - Simpan File Asli
        handlePhoto(e, target) {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 500 * 1024) return alert("Maksimal foto 500KB");
                this.photoPreview = URL.createObjectURL(file);
                target.fileFotoRaw = file;
            }
        },

        // Handle Dokumen - Simpan Array File Asli
        handleFile(e, target) {
            const files = Array.from(e.target.files);
            target.fileDokumenRaw = files;
        },

        // Fungsi Upload ke Storage
        async uploadFile(file, folder, nim) {
            const ext = file.name.split('.').pop();
            const fileName = `${folder}/${nim}_${Date.now()}.${ext}`;
            const { data, error } = await supabase.storage
                .from('berkas')
                .upload(fileName, file);
            if (error) throw error;
            return supabase.storage.from('berkas').getPublicUrl(fileName).data.publicUrl;
        },

        async handleSubmit() {
            this.loading = true;
            try {
                if (this.formData.tipe === 'Perorangan') {
                    await this.saveData(this.formData);
                } else {
                    for (let [i, mhs] of this.kelompok.entries()) {
                        this.progressText = `Mengirim Anggota ${i+1}/${this.kelompok.length}...`;
                        await this.saveData({ ...this.formData, ...mhs });
                    }
                }
                alert("Data Berhasil Disimpan ke Supabase!");
                window.location.reload();
            } catch (e) {
                alert("Error: " + e.message);
                this.loading = false;
            }
        },

        async saveData(payload) {
            let fotoUrl = payload.foto_url || "";
            let docUrls = [];

            // 1. Upload Foto
            if (payload.fileFotoRaw) {
                fotoUrl = await this.uploadFile(payload.fileFotoRaw, 'foto', payload.nim);
            }

            // 2. Upload Dokumen
            if (payload.fileDokumenRaw) {
                for (let doc of payload.fileDokumenRaw) {
                    const url = await this.uploadFile(doc, 'dokumen', payload.nim);
                    docUrls.push(url);
                }
            }

            // 3. Simpan ke Database
            const { error } = await supabase
                .from('peserta_didik')
                .insert([{
                    nama: payload.nama,
                    nim: payload.nim,
                    ktp: payload.ktp,
                    hp: payload.hp,
                    agama: payload.agama,
                    jenis_kelamin: payload.jenisKelamin,
                    tempat_lahir: payload.tempatLahir,
                    tanggal_lahir: payload.tanggalLahir,
                    alamat: payload.alamat,
                    kelurahan_kecamatan: payload.kelurahanKecamatan,
                    bagian: payload.bagian,
                    jenis_praktik: payload.jenis,
                    jenjang_pendidikan: payload.jenjangPendidikan,
                    level: parseInt(payload.level),
                    nama_institusi: payload.namaInstitusi,
                    jurusan: payload.jurusan,
                    kota_institusi: payload.kotaInstitusi,
                    start_date: payload.startDate,
                    end_date: payload.endDate,
                    foto_url: fotoUrl,
                    dokumen_url: docUrls.join(",")
                }]);

            if (error) throw error;
        }
    }
}
</script>
