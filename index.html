<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Peserta Didik 2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f3f4f6; padding: 2rem 1rem; }
        .card { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); max-width: 800px; margin: 0 auto; }
        .input-group { margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.875rem; font-weight: 600; color: #374151; margin-bottom: 0.5rem; }
        input, select, textarea { width: 100%; padding: 0.6rem; border: 1px solid #d1d5db; border-radius: 0.5rem; outline: none; }
        input:focus { border-color: #714B67; ring: 2px ring #714B67; }
        .btn-submit { background: #714B67; color: white; width: 100%; padding: 1rem; border-radius: 0.5rem; font-weight: 700; margin-top: 1rem; transition: 0.3s; }
        .btn-submit:hover { background: #5a3b52; }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body x-data="pendaftaran()">

    <div class="card">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">Pendaftaran Peserta Didik</h1>
            <p class="text-sm text-gray-500">Isi formulir di bawah ini dengan benar</p>
        </div>

        <form @submit.prevent="kirimData">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 p-4 bg-gray-50 rounded-lg">
                <div class="md:col-span-2"><h3 class="font-bold text-[#714B67]">I. Informasi Institusi</h3></div>
                
                <div class="input-group">
                    <label>Bagian</label>
                    <select x-model="f.bagian" required>
                        <option value="">-- Pilih --</option>
                        <option>Pelayanan Medik</option>
                        <option>Penunjang Medik</option>
                        <option>Umum</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Jenis Praktik</label>
                    <select x-model="f.jenis" required>
                        <option>Magang</option><option>PKL</option><option>Resident</option>
                    </select>
                </div>
                <div class="input-group md:col-span-2">
                    <label>Nama Institusi / Universitas</label>
                    <input type="text" x-model="f.institusi" placeholder="Contoh: Universitas Indonesia" required>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div class="md:col-span-2"><h3 class="font-bold text-[#714B67]">II. Biodata Peserta</h3></div>
                
                <div class="input-group md:col-span-2">
                    <label>Nama Lengkap</label>
                    <input type="text" x-model="f.nama" required>
                </div>
                <div class="input-group">
                    <label>NIM / NISN</label>
                    <input type="text" x-model="f.nim" required>
                </div>
                <div class="input-group">
                    <label>No. HP (WhatsApp)</label>
                    <input type="number" x-model="f.hp" placeholder="62812..." required>
                </div>
                <div class="input-group">
                    <label>Pas Foto (3x4)</label>
                    <input type="file" @change="handleFoto" accept="image/*" class="text-xs">
                </div>
                <div class="input-group">
                    <label>Dokumen PDF (STR/Ijazah)</label>
                    <input type="file" @change="handleFile" accept=".pdf" class="text-xs">
                </div>
            </div>

            <button type="submit" class="btn-submit" :disabled="loading">
                <span x-show="!loading">KIRIM PENDAFTARAN</span>
                <span x-show="loading">SEDANG MEMPROSES...</span>
            </button>
        </form>
        
        <button @click="window.location.href='edit.html'" class="w-full mt-4 text-sm text-gray-500 hover:underline">
            Lihat / Edit Data Terdaftar →
        </button>
    </div>

    <script>
        function pendaftaran() {
            // Konfigurasi Supabase
            const SB_URL = 'https://gyiucoognxykakksrulo.supabase.co';
            const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5aXVjb29nbnh5a2Fra3NydWxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyNjQ0MDQsImV4cCI6MjA5Mjg0MDQwNH0.Ht_yQbty5AaWYZWPp7sLWwIRDrmNs-LPot0NnVi3VIU';
            const supabase = supabasejs.createClient(SB_URL, SB_KEY);

            return {
                loading: false,
                f: {
                    bagian: '', jenis: 'Magang', institusi: '', 
                    nama: '', nim: '', hp: '',
                    fileFoto: null, fileDoc: null
                },

                handleFoto(e) { this.f.fileFoto = e.target.files[0]; },
                handleFile(e) { this.f.fileDoc = e.target.files[0]; },

                async upload(file, folder) {
                    if (!file) return "";
                    const ext = file.name.split('.').pop();
                    const fileName = `${folder}/${this.f.nim}_${Date.now()}.${ext}`;
                    const { data, error } = await supabase.storage.from('berkas').upload(fileName, file);
                    if (error) throw error;
                    return supabase.storage.from('berkas').getPublicUrl(fileName).data.publicUrl;
                },

                async kirimData() {
                    this.loading = true;
                    try {
                        // 1. Upload file dulu
                        const urlFoto = await this.upload(this.f.fileFoto, 'foto');
                        const urlDoc = await this.upload(this.f.fileDoc, 'dokumen');

                        // 2. Simpan ke Tabel 'peserta_didik'
                        const { error } = await supabase.from('peserta_didik').insert([{
                            nama: this.f.nama,
                            nim: this.f.nim,
                            hp: this.f.hp,
                            bagian: this.f.bagian,
                            jenis_praktik: this.f.jenis,
                            nama_institusi: this.f.institusi,
                            foto_url: urlFoto,
                            dokumen_url: urlDoc
                        }]);

                        if (error) throw error;

                        alert("Berhasil Terdaftar!");
                        location.reload();
                    } catch (err) {
                        alert("Gagal: " + err.message);
                        console.error(err);
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
