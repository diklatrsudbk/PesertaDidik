<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Sistem Data Peserta Didik 2026
  </title>

  <!-- TAILWIND -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ALPINE -->
  <script
    defer
    src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"
  ></script>

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="assets/css/style.css"
  >

</head>

<body
  class="bg-gray-100 min-h-screen p-4"
  x-data="app()"
>

<div class="max-w-4xl mx-auto">

  <!-- HEADER -->

  <div class="bg-white rounded-2xl shadow p-6 mb-6">

    <div class="flex items-center gap-4">

      <img
        src="assets/img/rsudbk.png"
        class="h-20"
        alt="Logo RSUD"
      >

      <div>

        <h1 class="text-2xl font-bold">
          Sistem Data Peserta Didik 2026
        </h1>

        <p class="text-gray-500 text-sm">
          Form Pendaftaran Peserta
        </p>

      </div>

    </div>

  </div>

  <!-- FORM -->

  <form
    @submit.prevent="submitForm"
    class="space-y-6"
  >

    <!-- DATA PRIBADI -->

    <div class="bg-white rounded-2xl shadow p-6">

      <h2 class="font-bold text-lg mb-5">
        Data Pribadi
      </h2>

      <div class="grid md:grid-cols-2 gap-4">

        <!-- NAMA -->

        <div>

          <label class="text-sm font-bold">
            Nama Lengkap
          </label>

          <input
            type="text"
            x-model="form.nama"
            class="w-full border rounded-lg p-3"
            required
          >

        </div>

        <!-- NIM -->

        <div>

          <label class="text-sm font-bold">
            NIM
          </label>

          <input
            type="text"
            x-model="form.nim"
            class="w-full border rounded-lg p-3"
            required
          >

        </div>

        <!-- KTP -->

        <div>

          <label class="text-sm font-bold">
            No KTP
          </label>

          <input
            type="number"
            x-model="form.ktp"
            class="w-full border rounded-lg p-3"
          >

        </div>

        <!-- HP -->

        <div>

          <label class="text-sm font-bold">
            No WhatsApp
          </label>

          <input
            type="number"
            x-model="form.hp"
            class="w-full border rounded-lg p-3"
            required
          >

        </div>

        <!-- TEMPAT LAHIR -->

        <div>

          <label class="text-sm font-bold">
            Tempat Lahir
          </label>

          <input
            type="text"
            x-model="form.tempatlahir"
            class="w-full border rounded-lg p-3"
          >

        </div>

        <!-- TANGGAL LAHIR -->

        <div>

          <label class="text-sm font-bold">
            Tanggal Lahir
          </label>

          <input
            type="date"
            x-model="form.tanggallahir"
            class="w-full border rounded-lg p-3"
          >

        </div>

        <!-- KELAMIN -->

        <div>

          <label class="text-sm font-bold">
            Jenis Kelamin
          </label>

          <select
            x-model="form.kelamin"
            class="w-full border rounded-lg p-3"
          >

            <option value="Laki-Laki">
              Laki-Laki
            </option>

            <option value="Perempuan">
              Perempuan
            </option>

          </select>

        </div>

        <!-- AGAMA -->

        <div>

          <label class="text-sm font-bold">
            Agama
          </label>

          <select
            x-model="form.agama"
            class="w-full border rounded-lg p-3"
          >

            <option value="Islam">Islam</option>
            <option value="Kristen">Kristen</option>
            <option value="Protestan">Protestan</option>
            <option value="Katolik">Katolik</option>
            <option value="Budha">Budha</option>
            <option value="Hindu">Hindu</option>
            <option value="Konghucu">Konghucu</option>

          </select>

        </div>

        <!-- ALAMAT -->

        <div class="md:col-span-2">

          <label class="text-sm font-bold">
            Alamat
          </label>

          <textarea
            x-model="form.alamat"
            class="w-full border rounded-lg p-3"
            rows="4"
          ></textarea>

        </div>

      </div>

    </div>

    <!-- DATA PENDIDIKAN -->

    <div class="bg-white rounded-2xl shadow p-6">

      <h2 class="font-bold text-lg mb-5">
        Data Pendidikan
      </h2>

      <div class="grid md:grid-cols-2 gap-4">

        <!-- INSTITUSI -->

        <div>

          <label class="text-sm font-bold">
            Nama Institusi
          </label>

          <input
            type="text"
            x-model="form.namasekolah"
            class="w-full border rounded-lg p-3"
          >

        </div>

        <!-- JURUSAN -->

        <div>

          <label class="text-sm font-bold">
            Jurusan
          </label>

          <input
            type="text"
            x-model="form.jurusan"
            class="w-full border rounded-lg p-3"
          >

        </div>

        <!-- JENJANG -->

        <div>

          <label class="text-sm font-bold">
            Jenjang Pendidikan
          </label>

          <select
            x-model="form.jenjangpend"
            class="w-full border rounded-lg p-3"
          >

            <option value="SMK">SMK</option>
            <option value="D3">D3</option>
            <option value="S1">S1</option>
            <option value="S2">S2</option>
            <option value="Profesi">Profesi</option>

          </select>

        </div>

        <!-- JENIS -->

        <div>

          <label class="text-sm font-bold">
            Jenis
          </label>

          <select
            x-model="form.jenis"
            class="w-full border rounded-lg p-3"
          >

            <option value="PKL">PKL</option>
            <option value="PBL">PBL</option>
            <option value="Resident">Resident</option>
            <option value="Magang">Magang</option>

          </select>

        </div>

        <!-- BAGIAN -->

        <div>

          <label class="text-sm font-bold">
            Bagian
          </label>

          <select
            x-model="form.bagian"
            class="w-full border rounded-lg p-3"
          >

            <option value="Pelayanan Medik">
              Pelayanan Medik
            </option>

            <option value="Penunjang Medik">
              Penunjang Medik
            </option>

            <option value="Umum">
              Umum
            </option>

          </select>

        </div>

      </div>

    </div>

    <!-- PERIODE -->

    <div class="bg-white rounded-2xl shadow p-6">

      <h2 class="font-bold text-lg mb-5">
        Periode
      </h2>

      <div class="grid md:grid-cols-2 gap-4">

        <!-- MULAI -->

        <div>

          <label class="text-sm font-bold">
            Tanggal Mulai
          </label>

          <input
            type="date"
            x-model="form.tanggal_mulai"
            class="w-full border rounded-lg p-3"
          >

        </div>

        <!-- SELESAI -->

        <div>

          <label class="text-sm font-bold">
            Tanggal Selesai
          </label>

          <input
            type="date"
            x-model="form.tanggal_selesai"
            class="w-full border rounded-lg p-3"
          >

        </div>

      </div>

    </div>

    <!-- FOTO -->

    <div class="bg-white rounded-2xl shadow p-6">

      <h2 class="font-bold text-lg mb-5">
        Upload Pas Foto
      </h2>

      <input
        type="file"
        accept=".jpg,.jpeg,.png"
        @change="handlePhoto"
      >

      <p class="text-xs text-gray-500 mt-2">
        Format: JPG / PNG maksimal 2MB
      </p>

    </div>

    <!-- PDF -->

    <div class="bg-white rounded-2xl shadow p-6">

      <h2 class="font-bold text-lg mb-5">
        Upload Dokumen PDF
      </h2>

      <input
        type="file"
        multiple
        accept=".pdf"
        @change="handlePdf"
      >

      <p class="text-xs text-gray-500 mt-2">
        Total maksimal PDF 10MB
      </p>

    </div>

    <!-- SUBMIT -->

    <button
      type="submit"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold text-lg disabled:opacity-50"
      :disabled="loading"
    >

      <span x-show="!loading">
        SUBMIT DATA
      </span>

      <span x-show="loading">
        MENGIRIM DATA...
      </span>

    </button>

  </form>

</div>

<!-- CONFIG -->
<script src="assets/js/config.js"></script>

<!-- HELPERS -->
<script src="assets/js/helpers.js"></script>

<!-- API -->
<script src="assets/js/api.js"></script>

<!-- APP -->
<script src="assets/js/app.js"></script>

</body>
</html>
