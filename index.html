<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Test API Diklat</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-10">

  <div class="max-w-xl mx-auto bg-white p-6 rounded-xl shadow">

    <h1 class="text-2xl font-bold mb-6">
      Test Input Peserta
    </h1>

    <form id="myForm" class="space-y-4">

      <input
        type="text"
        id="nama"
        placeholder="Nama"
        class="w-full border p-3 rounded"
        required
      >

      <input
        type="text"
        id="nim"
        placeholder="NIM"
        class="w-full border p-3 rounded"
        required
      >

      <button
        type="submit"
        class="bg-blue-600 text-white px-5 py-3 rounded"
      >
        Kirim
      </button>

    </form>

    <div id="result" class="mt-5 text-sm"></div>

  </div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycby2878XyWx79MpBjwQSR137ocsaYIz_IwTSgzJruTu1Ls-X1VIG6hvG4ooPVPteukLUVg/exec";

document
.getElementById("myForm")
.addEventListener("submit", async function(e){

  e.preventDefault();

  const result = document.getElementById("result");

  result.innerHTML = "Mengirim data...";

  const payload = {

    nama: document.getElementById("nama").value,

    nim: document.getElementById("nim").value,

    tanggallahir: "2000-01-01",

    tanggal_mulai: "2026-01-01",

    tanggal_selesai: "2026-02-01"

  };

  try {

    const response = await fetch(API_URL, {

      method: "POST",

      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },

      body: JSON.stringify(payload)

    });

    const data = await response.json();

    result.innerHTML = JSON.stringify(data);

  } catch(err) {

    result.innerHTML = err.toString();

  }

});

</script>

</body>
</html>
