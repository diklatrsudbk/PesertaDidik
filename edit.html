<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Data Peserta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8f9fa; }
        [x-cloak] { display: none !important; }
        .table-container { background: white; border-radius: 1rem; shadow: 0 4px 20px rgba(0,0,0,0.04); overflow: hidden; }
        .search-input { border: 1px solid #dee2e6; padding: 0.6rem 1rem; border-radius: 0.5rem; outline: none; transition: all 0.2s; }
        .search-input:focus { border-color: #714B67; box-shadow: 0 0 0 3px rgba(113, 75, 103, 0.1); }
    </style>
</head>
<body class="py-10 px-4" x-data="editApp()" x-init="initData()">

    <div class="max-w-6xl mx-auto">
    <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <div class="flex items-center gap-4 text-left">
            <img src="rsudbk.png" 
                 alt="Logo RSUD BK" 
                 class="h-16 w-auto object-contain"> 

            <div>
                <h1 class="text-2xl font-extrabold text-[#212529]">Database Peserta 2026</h1>
                <p class="text-sm text-gray-500">Kelola, filter, dan hapus data pendaftaran</p>
            </div>
        </div>
            <button @click="window.location.href='index.html'" 
        class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-5 py-2 rounded-lg font-bold text-sm transition">
    ← Kembali ke Menu
</button>

        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm mb-6 border border-gray-100">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-[10px] font-bold uppercase text-gray-400 mb-1">Cari NIM / Nama</label>
                    <input type="text" x-model="filters.search" placeholder="Ketik NIM atau Nama..." class="search-input w-full">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-gray-400 mb-1">Filter Jurusan</label>
                    <select x-model="filters.jurusan" class="search-input w-full bg-white">
                        <option value="">Semua Jurusan</option>
                        <template x-for="j in uniqueJurusan" :key="j">
                            <option :value="j" x-text="j"></option>
                        </template>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-gray-400 mb-1">Filter Institusi</label>
                    <select x-model="filters.institusi" class="search-input w-full bg-white">
                        <option value="">Semua Institusi</option>
                        <template x-for="i in uniqueInstitusi" :key="i">
                            <option :value="i" x-text="i"></option>
                        </template>
                    </select>
                </div>
            </div>
        </div>

        <div class="table-container border">
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="bg-gray-50 text-gray-600 border-b">
                        <tr>
                            <th class="p-4 font-semibold">Nama & NIM</th>
                            <th class="p-4 font-semibold">Institusi</th>
                            <th class="p-4 font-semibold">Jurusan</th>
                            <th class="p-4 font-semibold">Periode</th>
                            <th class="p-4 font-semibold text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-if="loading">
                            <tr>
                                <td colspan="5" class="p-10 text-center text-gray-400">Sedang memuat data...</td>
                            </tr>
                        </template>
                        
                        <template x-if="!loading && filteredData.length === 0">
                            <tr>
                                <td colspan="5" class="p-10 text-center text-gray-400">Data tidak ditemukan.</td>
                            </tr>
                        </template>

                        <template x-for="(item, index) in filteredData" :key="index">
                            <tr class="border-b hover:bg-gray-50 transition">
                                <td class="p-4">
                                    <div class="font-bold text-[#714B67]" x-text="item.nama"></div>
                                    <div class="text-[11px] text-gray-500" x-text="'NIM: ' + item.nim"></div>
                                </td>
                                <td class="p-4 text-gray-600" x-text="item.namaInstitusi"></td>
                                <td class="p-4">
                                    <span class="bg-purple-50 text-purple-700 px-2 py-1 rounded text-[10px] font-bold" x-text="item.jurusan"></span>
                                </td>
                                <td class="p-4 text-xs text-gray-500">
                                    <span x-text="formatDate(item.startDate)"></span> - <span x-text="formatDate(item.endDate)"></span>
                                </td>
                                <td class="p-4 text-center">
                                    <button @click="window.open('index.html?p=index&action=edit&nim=' + item.nim, '_top')" 
                                    class="text-blue-500 hover:text-blue-700 font-bold text-xs p-2">
                                        Edit
                                    </button>
                                    <button @click="hapusData(item.nim, item.nama)" class="text-red-500 hover:text-red-700 font-bold text-xs p-2">
                                        Hapus
                                    </button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function editApp() {
    return {
        loading: false,
        allData: [],
        filters: {
            search: '',
            jurusan: '',
            institusi: ''
        },
        config: {
            targetSheet: "GEL6",
            // PASTIKAN URL INI ADALAH URL DEPLOYMENT TERBARU ANDA
            scriptUrl: "https://script.google.com/macros/s/AKfycby2o_XXEpjdh14jRQ3ScFWesbMGtAyN0hDCW00FO1u65EhHLTg-PpXlGXkrv57U4At0/exec"
        },

        initData() {
            this.loading = true;
            const url = this.config.scriptUrl + "?action=read&t=" + new Date().getTime();

            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error('Respons jaringan gagal');
                    return response.json();
                })
                .then(res => {
                    this.allData = Array.isArray(res) ? res : [];
                    this.loading = false;
                })
                .catch(err => {
                    console.error("Gagal load:", err);
                    this.loading = false;
                    alert("Koneksi gagal. Pastikan Script sudah di-Deploy sebagai 'Anyone'.");
                });
        },

        get filteredData() {
            return this.allData.filter(item => {
                const nama = item.nama ? item.nama.toLowerCase() : '';
                const nim = item.nim ? item.nim.toString().toLowerCase() : '';
                const searchTxt = this.filters.search.toLowerCase();
                
                const matchSearch = nama.includes(searchTxt) || nim.includes(searchTxt);
                const matchJurusan = this.filters.jurusan === '' || item.jurusan === this.filters.jurusan;
                const matchInstitusi = this.filters.institusi === '' || item.namaInstitusi === this.filters.institusi;
                
                return matchSearch && matchJurusan && matchInstitusi;
            });
        },

        get uniqueJurusan() {
            return [...new Set(this.allData.map(i => i.jurusan).filter(Boolean))].sort();
        },

        get uniqueInstitusi() {
            return [...new Set(this.allData.map(i => i.namaInstitusi).filter(Boolean))].sort();
        },

        formatDate(dateStr) {
            if (!dateStr) return '-';
            try {
                const d = new Date(dateStr);
                return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short' });
            } catch(e) { return '-'; }
        },

        async hapusData(nim, nama) {
    if (confirm(`Hapus data ${nama} (NIM: ${nim})?`)) {
        this.loading = true;
        
        const finalPayload = { 
            action: "delete",
            nim: nim,
            targetSheet: this.config.targetSheet
        };

        try {
            const response = await fetch(this.config.scriptUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(finalPayload),
                redirect: 'follow' 
            });

            const result = await response.json();
            
            if (result.status === "deleted") {
                alert("Data dan folder berhasil dihapus.");
                this.initData(); // Refresh tabel
            } else {
                alert("Gagal menghapus: " + (result.message || "Data tidak ditemukan"));
                this.loading = false;
            }
        } catch (err) {
            console.error("Error hapus:", err);
            alert("Terjadi kesalahan koneksi saat menghapus.");
            this.loading = false;
        }
    }
}
    }
}
    </script>
</body>
</html>
